services:
  organigrama:
    build: .
    container_name: organigrama-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TZ=UTC
    volumes:
      - ./tmp_uploads:/app/tmp_uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
